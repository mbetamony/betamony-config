general {
    hide_cursor = true
    grace = 0
    no_fade_in = true
    immediate_render = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 7
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    outer_color = rgb(33, 204, 255)
    inner_color = rgba(30, 30, 30, 0.8)
    font_color = rgb(220, 220, 220)
    placeholder_text = Password...
    fail_text = <i>Wrong password</i>
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(220, 220, 220, 1.0)
    font_size = 70
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(220, 220, 220, 0.8)
    font_size = 22
    position = 0, 60
    halign = center
    valign = center
}
